spring:
  application:
    name: shea-ai-agent
  ai:
    dashscope:
      chat:
        options:
          model: qwen-plus
  profiles:
    active: local
server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.shea.ai.sheaaiagent.controller
knife4j:
  enable: true
  setting:
    language: zh_cn